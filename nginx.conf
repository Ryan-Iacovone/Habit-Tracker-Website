server {
    listen 8501;
    # Serve chart images directly — never hits Flask
    location /static/charts/ {
        alias /app/static/charts/;
        expires 7d;          # browser can cache for a week
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://habit-website:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}