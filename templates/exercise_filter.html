<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1.0"> I like this page better without this --> 
    <!-- Link to external CSS file for consistent styling across pages -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* Styling for pandas DataFrame table */
        .workout-table {
            border-collapse: collapse;
            width: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            margin: 25px 0;
            font-size: 0.9em;
        }
        .workout-table thead th {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            border: 1px solid #ddd;
            padding: 12px 15px;
            text-align: left;
        }
        .workout-table tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .workout-table tbody td {
            border: 1px solid #ddd;
            padding: 8px 15px;
        }
        .workout-table tbody tr:hover {
            background-color: #e6f7e6;
        }
    
    </style>
</head>

<body>
    <div class="container_narrow">
        <div class="section">
            <h1>Exercise Filter</h1>
                <!-- Navigation buttons -->
                <div class="nav-buttons">
                    <a href="/"                         class="nav-button">Home</a>
                    <a href="/exercise_filter"          class="nav-button">Exercise Filter</a>
                    <a href="/habit_calendar"           class="nav-button">Habit Calendar</a>
                    <a href="/overview_visualizations"  class="nav-button">Overview Visuals</a>
                    <a href="/10rm_tracker"             class="nav-button">10 RM Workouts</a>
                </div>

            <h2>Filter by Exercise</h2>
            <form method="POST" id="exercise-form">
                <label for="exercise">Exercise:</label>
                <select name="exercise" id="exercise" onchange="this.form.submit()">
                    {% for exercise in exercise_options %}
                        <option value="{{ exercise }}" {% if exercise == selected_exercise %}selected{% endif %}>
                            {{ exercise }}
                        </option>
                    {% endfor %}
                </select>
            </form>
        </div>
    

        <div class="section">
            <h2>Filtered Workout Table</h2>

            {{ df_html_table | safe }}
        </div>
    </div>
</body>
</html>
