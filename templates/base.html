<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Habit Tracker{% endblock %}</title>
    <style>
        /* Base styles shared across all pages */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        /* ── Header & Nav ── */
        .site-header {
            background-color: #2c3e50;
            padding: 15px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .site-header h1 {
            color: white;
            margin: 0 0 12px 0;
            text-align: center;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .nav-button {
            background-color: #2196F3;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
        }

        .nav-button:hover {
            background-color: #0b7dda;
        }

        .nav-button.active {
            background-color: #0b7dda;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* ── Page content wrapper ── */
        .page-content {
            padding: 20px;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <header class="site-header">
        <h1>🏃 Habit & Training Tracker</h1>
        <nav class="nav-buttons">
            <a href="/"                       class="nav-button {% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/overview_visualizations" class="nav-button {% if request.path == '/overview_visualizations' %}active{% endif %}">Training Dashboard</a>
            <a href="/habit_calendar"         class="nav-button {% if request.path == '/habit_calendar' %}active{% endif %}">Habit Calendar</a>
            <a href="/exercise_filter"        class="nav-button {% if request.path == '/exercise_filter' %}active{% endif %}">Exercise Filter</a>
            <a href="/10rm_tracker"           class="nav-button {% if request.path == '/10rm_tracker' %}active{% endif %}">10RM Workouts</a>
        </nav>
    </header>

    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
