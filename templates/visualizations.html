<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visualization Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }
        .section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .flex-container {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap; /* allows wrapping on smaller screens */
        }

        .plot-box {
            flex: 1;
            min-width: 300px;
        }

        .plot-box img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

    </style>
</head>
<body>

    <h1>Combined Visualization Dashboard</h1>
    </div>
        <a href="/" class="back-link">← Back to Habit Tracker input</a>
    </div>

    <div class="section flex-container">
        <div class="plot-box">
            <h2>Static Plot (Matplotlib)</h2>
            <img src="{{ matplotlib_plot_url }}" alt="Matplotlib Plot">
        </div>
        <div class="plot-box">
            <h2>Static Plot (Seaborn)</h2>
            <img src="{{ seaborn_plot_url }}" alt="Seaborn Plot">
        </div>
    </div>    

    <div class="section">
        <h2>Interactive Plot (Plotly)</h2>
        {{ plotly_html | safe }}
    </div>
</body>
</html>
